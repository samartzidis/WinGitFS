name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v2.0.0). Leave empty to only build.'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    name: Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish WinGitFS/WinGitFS.csproj -p:PublishProfile=FolderProfile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinGitFS-win-x64
          path: WinGitFS/bin/Release/net8.0-windows/publish/win-x64/WinGitFS.exe
          if-no-files-found: error

  release:
    needs: build
    if: github.event.inputs.tag_name != ''
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: WinGitFS-win-x64
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          files: release-assets/WinGitFS.exe
          generate_release_notes: true
